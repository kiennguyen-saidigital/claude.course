<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Image Search Agent</title></head>
<body>
  <form id="searchForm">
    <input id="query" type="text" placeholder="What images are you looking for?" required />
    <button type="submit">Start searching</button>
  </form>

  <div id="error" style="display:none; color:#b00020; margin-top:12px;"></div>

  <div id="grid" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:16px;"></div>

  <div id="actions" style="display:none; margin-top:16px;">
    <button id="continueBtn">Continue (not what I want)</button>
    <button id="stopBtn">Stop (looks good)</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
